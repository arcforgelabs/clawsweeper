name: ClawSweeper Live Dashboard

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "dashboard/**"
      - "scripts/dashboard-refresh-ci.mjs"
      - "scripts/dashboard-smoke.mjs"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/dashboard-ci.yml"
      - ".github/workflows/dashboard.yml"

permissions:
  contents: read

concurrency:
  group: clawsweeper-live-dashboard
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy dashboard Worker
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_ACCOUNT_ID: 91b59577e757131d68d55a471fe32aca
      CLOUDFLARE_API_TOKEN: ${{ secrets.OPENCLAW_CLOUDFLARE_WORKERS_API_TOKEN || secrets.OPENCLAW_CLOUDFLARE_API_TOKEN }}
      CF_API_TOKEN: ${{ secrets.OPENCLAW_CLOUDFLARE_WORKERS_API_TOKEN || secrets.OPENCLAW_CLOUDFLARE_API_TOKEN }}
      CLAWSWEEPER_STATUS_URL: https://clawsweeper.openclaw.ai
      CLAWSWEEPER_STATUS_INGEST_TOKEN: ${{ secrets.CLAWSWEEPER_STATUS_INGEST_TOKEN }}
      CLAWSWEEPER_APP_PRIVATE_KEY: ${{ secrets.CLAWSWEEPER_APP_PRIVATE_KEY }}
      CLAWSWEEPER_WEBHOOK_SECRET: ${{ secrets.CLAWSWEEPER_WEBHOOK_SECRET }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: ./.github/actions/setup-pnpm

      - name: Verify Cloudflare token is configured
        run: test -n "$CLOUDFLARE_API_TOKEN"

      - name: Prepare deploy config
        id: dashboard-config
        run: |
          test -n "$CLAWSWEEPER_STATUS_INGEST_TOKEN"
          cp dashboard/wrangler.toml dashboard/wrangler.deploy.toml
          printf 'INGEST_TOKEN = "%s"\n' "$CLAWSWEEPER_STATUS_INGEST_TOKEN" >> dashboard/wrangler.deploy.toml
          echo "config=dashboard/wrangler.deploy.toml" >> "$GITHUB_OUTPUT"

      - name: Sync Worker secrets
        run: |
          set -euo pipefail
          test -n "$CLAWSWEEPER_APP_PRIVATE_KEY"
          test -n "$CLAWSWEEPER_WEBHOOK_SECRET"
          secrets_file="$RUNNER_TEMP/clawsweeper-worker-secrets.json"
          node -e '
            const fs = require("node:fs");
            const names = ["CLAWSWEEPER_APP_PRIVATE_KEY", "CLAWSWEEPER_WEBHOOK_SECRET"];
            const secrets = Object.fromEntries(names.map((name) => [name, process.env[name] || ""]));
            if (Object.values(secrets).some((value) => !value)) process.exit(2);
            fs.writeFileSync(process.argv[1], JSON.stringify(secrets));
          ' "$secrets_file"
          npx wrangler@4.90.0 secret bulk "$secrets_file" --config "${{ steps.dashboard-config.outputs.config }}"
          rm -f "$secrets_file"

      - name: Deploy Worker
        run: npx wrangler@4.90.0 deploy --config "${{ steps.dashboard-config.outputs.config }}"

      - name: Smoke test live dashboard
        run: pnpm run dashboard:smoke -- "$CLAWSWEEPER_STATUS_URL"
